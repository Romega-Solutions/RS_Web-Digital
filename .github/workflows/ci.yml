name: CI
on:
  push:
    branches: [main, master, redesign/ui-audit-fixes]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - uses: pnpm/action-setup@v6
        with:
          version: 9.15.9
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint
      - run: pnpm run typecheck
      - run: pnpm run check:env:production
        env:
          NEXT_PUBLIC_SITE_URL: https://www.romega-solutions.com
          RESEND_API_KEY: re_ci_placeholder_123456
          ADMIN_EMAIL: info@romega-solutions.com
          RECAPTCHA_TIMEOUT_MS: "5000"
      - run: pnpm run build
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run audit:responsive
      - run: pnpm run audit:a11y
      - run: pnpm run audit:keyboard
      - run: pnpm run audit:product
      - run: pnpm run audit:visual
